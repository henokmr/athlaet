<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>athlaet - countdown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton+SC&family=Antonio:wght@100..700&display=swap"
      rel="stylesheet"
    />

    <style>
      html, body {
        background-color: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        overflow: hidden !important;
        position: fixed; 
        touch-action: none;
      }
      .hero {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .hero-countdown {
        position: absolute;
        z-index: 2;
        text-align: center;
      }

      .hero-base {
        width: 200%;
        position: absolute;
        z-index: 1;
        align-self: center;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .hero-base img {
        width: 60%;
        height: auto;
      }

      h1 {
        color: #eb6e09;
        font-family: 'Anton SC', sans-serif;
        font-size: 80px;
        margin-bottom: 40px;
      }
      p {
        color: #ffefeb;

        margin: 0;
        font-family: 'Antonio', sans-serif;
        font-size: 30px;
      }

      @media (max-width: 768px) {
        .hero {
          height: 100dvh;
        }
        .hero-base img {
          width: 90%;
          height: auto;
          max-width: 800px;
        }

        h1 {
          font-size: 60px;
          letter-spacing: -2px;
          margin-bottom: 0px;
        }

        .countdown-time {
          font-size: 22px;
          margin-top: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="hero">
      <div class="hero-base">
        <img src="images/bg-website-countdown.png" alt="vase-and-logo" />
      </div>
      <div class="hero-countdown">
        <h1>COUNTDOWN</h1>
        <p class="countdown-time">Cargando...</p>
      </div>
    </div>

    <script>
      const timeLeftDisplay =
        document.getElementsByClassName('countdown-time')[0];

      const targetDate = new Date('August 24, 2026 23:59:59').getTime();

      function updateCountdown() {
        const now = new Date().getTime();
        const difference = targetDate - now;

        if (difference < 0) {
          timeLeftDisplay.innerHTML = 'tempo cumplido';
          clearInterval(interval);
          return;
        }

        const days = Math.floor(difference / (1000 * 60 * 60 * 24));
        const hours = Math.floor(
          (difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
        );
        const minutes = Math.floor(
          (difference % (1000 * 60 * 60)) / (1000 * 60),
        );
        const seconds = Math.floor((difference % (1000 * 60)) / 1000);

        timeLeftDisplay.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
      }

      const interval = setInterval(updateCountdown, 1000);

      updateCountdown();
    </script>
  </body>
</html>
